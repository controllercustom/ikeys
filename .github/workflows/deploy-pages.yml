name: Build firmware and deploy flasher site to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Update core index
        run: arduino-cli core update-index

      - name: Install ESP32 core (pinned 3.3.10)
        run: arduino-cli core install esp32:esp32@3.3.10

      - name: Update library index
        run: arduino-cli lib update-index

      - name: Install libraries (pinned)
        run: |
          arduino-cli lib install "WiFiManager@2.0.17" "M5GFX@0.2.26" "WebSockets@2.7.2"

      - name: Compile Generic ESP32-S3 Dev Module
        run: |
          arduino-cli compile --fqbn "esp32:esp32:esp32s3:USBMode=default,CDCOnBoot=default" \
            --output-dir build/esp32s3 .

      - name: Compile M5Stack AtomS3
        run: |
          arduino-cli compile --fqbn "esp32:esp32:m5stack_atoms3:PartitionScheme=default_8MB,USBMode=default,CDCOnBoot=default" \
            --output-dir build/m5stack_atoms3 .

      - name: Copy firmware binaries to docs
        run: |
          mkdir -p docs/firmware/esp32s3 docs/firmware/m5stack_atoms3
          cp build/esp32s3/ikeys.ino.bootloader.bin docs/firmware/esp32s3/bootloader.bin
          cp build/esp32s3/ikeys.ino.partitions.bin  docs/firmware/esp32s3/partitions.bin
          cp build/esp32s3/ikeys.ino.bin              docs/firmware/esp32s3/firmware.bin
          cp build/m5stack_atoms3/ikeys.ino.bootloader.bin docs/firmware/m5stack_atoms3/bootloader.bin
          cp build/m5stack_atoms3/ikeys.ino.partitions.bin  docs/firmware/m5stack_atoms3/partitions.bin
          cp build/m5stack_atoms3/ikeys.ino.bin              docs/firmware/m5stack_atoms3/firmware.bin
          find ~/.arduino15 -name "boot_app0.bin" -exec cp {} docs/firmware/esp32s3/ \; || true
          find ~/.arduino15 -name "boot_app0.bin" -exec cp {} docs/firmware/m5stack_atoms3/ \; || true

      - name: Generate firmware manifests
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os
          version = os.environ.get('VERSION', '0.0.0').lstrip('v')
          repo = os.environ.get('REPO', 'controllercustom/ikeys')
          common = {
              'name': 'iKeys Assistive Keyboard',
              'version': version,
              'homepage': f'https://github.com/{repo}',
          }
          esp32s3 = {
              **common,
              'builds': [{
                  'chipFamily': 'ESP32-S3',
                  'name': 'Generic ESP32-S3 Dev Module',
                  'flash_size': '4MB',
                  'parts': [
                      {'path': 'esp32s3/bootloader.bin', 'offset': 0},
                      {'path': 'esp32s3/partitions.bin', 'offset': 32768},
                      {'path': 'esp32s3/boot_app0.bin', 'offset': 57344},
                      {'path': 'esp32s3/firmware.bin', 'offset': 65536},
                  ],
              }],
          }
          atoms3 = {
              **common,
              'builds': [{
                  'chipFamily': 'ESP32-S3',
                  'name': 'M5Stack AtomS3',
                  'flash_size': '8MB',
                  'parts': [
                      {'path': 'm5stack_atoms3/bootloader.bin', 'offset': 0},
                      {'path': 'm5stack_atoms3/partitions.bin', 'offset': 32768},
                      {'path': 'm5stack_atoms3/boot_app0.bin', 'offset': 57344},
                      {'path': 'm5stack_atoms3/firmware.bin', 'offset': 65536},
                  ],
              }],
          }
          with open('docs/firmware/esp32s3.json', 'w') as f:
              json.dump(esp32s3, f, indent=2)
          with open('docs/firmware/m5stack_atoms3.json', 'w') as f:
              json.dump(atoms3, f, indent=2)
          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

